<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Payment Completed</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #090c10;
        --em: #00e87a;
        --em-glow: rgba(0, 232, 122, 0.2);
        --em-dim: rgba(0, 232, 122, 0.08);
        --text: #c9d1dc;
        --text-dim: #5a6478;
        --heading: #edf0f5;
        --border: rgba(255, 255, 255, 0.08);
        --sans: 'Syne', sans-serif;
        --mono: 'DM Mono', monospace;
      }

      body {
        font-family: var(--sans);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg);
        overflow: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse 70% 60% at 50% 50%,
          rgba(0, 232, 122, 0.07) 0%,
          transparent 65%
        );
        pointer-events: none;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        pointer-events: none;
      }

      .card {
        position: relative;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 52px 40px;
        width: 100%;
        max-width: 380px;
        text-align: center;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.04) inset,
          0 24px 60px rgba(0, 0, 0, 0.7),
          0 0 100px rgba(0, 232, 122, 0.06);
        animation: arrive 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      @keyframes arrive {
        from {
          opacity: 0;
          transform: scale(0.92) translateY(20px);
        }
        to {
          opacity: 1;
          transform: scale(1) translateY(0);
        }
      }

      .card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 15%;
        right: 15%;
        height: 1px;
        background: linear-gradient(90deg, transparent, var(--em), transparent);
      }

      .icon {
        font-size: 2.6rem;
        margin-bottom: 20px;
        display: block;
        animation: iconPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s both;
        /* replace emoji with a custom SVG ring */
        position: relative;
      }

      /* animated ring behind the checkmark */
      .icon::before {
        content: '';
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        border: 1.5px solid var(--em);
        opacity: 0;
        animation: ringExpand 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
      }

      @keyframes iconPop {
        from {
          transform: scale(0.5);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      @keyframes ringExpand {
        from {
          transform: scale(0.6);
          opacity: 0.8;
        }
        to {
          transform: scale(1.3);
          opacity: 0;
        }
      }

      h1 {
        font-family: var(--sans);
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--em);
        margin-bottom: 10px;
        animation: fadeUp 0.4s ease 0.35s both;
      }

      p {
        color: var(--text-dim);
        font-size: 0.78rem;
        font-family: var(--mono);
        letter-spacing: 0.03em;
        animation: fadeUp 0.4s ease 0.45s both;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* closing countdown bar */
      .progress {
        margin-top: 28px;
        height: 2px;
        background: rgba(255, 255, 255, 0.06);
        border-radius: 2px;
        overflow: hidden;
        animation: fadeUp 0.4s ease 0.5s both;
      }

      .progress::after {
        content: '';
        display: block;
        height: 100%;
        background: var(--em);
        border-radius: 2px;
        animation: drain 3s linear 0.6s forwards;
        box-shadow: 0 0 8px var(--em);
      }

      @keyframes drain {
        from {
          width: 100%;
        }
        to {
          width: 0%;
        }
      }

      h1.failed {
        color: #f87171;
      }

      p.meta {
        margin-top: 6px;
        font-size: 0.72rem;
      }

      p.closing {
        margin-top: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">✅</div>
      <h1>Payment Competed!</h1>
      <p>This window will close shortly...</p>
      <div class="progress"></div>
    </div>
    <script type="module" src="/src/completed.ts"></script>
  </body>
</html>
